name: popishop_flutter
description: "PopiDigicam - E-commerce app for digital cameras"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State management
  provider: ^6.1.2

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Local storage
  shared_preferences: ^2.3.2

  # Image picker
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.4
  sqflite_common_ffi: 2.4.0+3
  sqflite_common_ffi_web: 1.1.1

  # Map & external links
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
